services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_VERSION: ${IMAGE_TAG:-productionfull}
    image: ${IMAGE_NAME:-mvp-pushbus}:${IMAGE_TAG:-productionfull}
    pull_policy: build
    restart: unless-stopped

    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-America/Sao_Paulo}

      CITTATI_BASE_URL: ${CITTATI_BASE_URL:-https://flits.cittati.com.br}
      CITTATI_APP_CODE: ${CITTATI_APP_CODE:-200}
      CITTATI_CLIENT_ID: ${CITTATI_CLIENT_ID:-1}
      CITTATI_COMPANY_ID: ${CITTATI_COMPANY_ID}
      CITTATI_USERNAME: ${CITTATI_USERNAME}
      CITTATI_PASSWORD: ${CITTATI_PASSWORD}
      CITTATI_TOKEN: ${CITTATI_TOKEN:-}

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-web}"

      - "traefik.http.routers.mvp-pushbus.rule=Host(`${APP_HOST:-mvp-pushbus.i9cidade.com.br}`)"
      - "traefik.http.routers.mvp-pushbus.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.mvp-pushbus.tls=true"
      - "traefik.http.routers.mvp-pushbus.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"

      - "traefik.http.services.mvp-pushbus.loadbalancer.server.port=${PORT:-3000}"

    networks:
      - web

networks:
  web:
    external: true
    name: ${TRAEFIK_NETWORK:-web}
